name: 文档或模板建议
description: 建议改进文档、题材模板、参考资料、示例或新手引导。
title: "【Docs/Templates】"
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        好的文档或模板建议，最好先指出现在哪里不清楚、缺失或过时，再说明你希望补成什么样。如需举例，请只贴脱敏后的短片段。
  - type: textarea
    id: target
    attributes:
      label: 需要改什么？
      description: 哪个文档、模板、题材画像、参考文件或新手步骤需要调整？
      placeholder: "例如：docs/guides/genres.md 需要补充玄幻 + 规则怪谈复合题材的使用说明。"
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: 当前问题
      description: 现在有哪些内容令人困惑、缺失、过时或不好用？
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: 建议改法
      description: 请描述你希望增加的说明、示例、模板字段或参考规则。
    validations:
      required: true
  - type: dropdown
    id: audience
    attributes:
      label: 主要受众
      description: 谁最需要这个改进？
      options:
        - 新用户
        - 插件维护者
        - 题材 / 模板贡献者
        - Dashboard 用户
        - 高级 CLI 用户
        - 其他
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: 使用模型
      description: 如果这个建议和模型输出、提示词或 Agent 行为有关，请填写模型名称；不相关时请填“不适用”。
      placeholder: "例如：deepseek-v4-pro / gpt-5.5 / claude-opus-4-8 / claude-sonnet-4-6 / gemini-3.1-pro-preview / gemini-3.5-flash / 不适用"
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我已经检查过现有文档和模板。
          required: true
        - label: 我没有包含私密小说内容；如必须举例，也只提供了短片段并已脱敏。
          required: true
